AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: HTTP proxy — browser (or Cloudflare) → Lambda Function URL → API_UPSTREAM (real API origin).

Parameters:
  ApiUpstream:
    Type: String
    Description: >
      Direct origin of the Express/API app (e.g. Render https://*.onrender.com).
      Do NOT set this to the same apishop.online hostname you point at this Lambda in Cloudflare,
      or the proxy will call itself in a loop. Use DNS-only / grey-cloud origin URL, or a separate origin label.
  ProxyClientIp:
    Type: String
    Default: "203.0.113.1"
    Description: Sent to upstream as X-Forwarded-For / X-Real-IP.
  CorsAllowOrigin:
    Type: String
    Default: "*"
    Description: Reserved for future use; CORS is handled in Lambda (reflects Origin or *).

Globals:
  Function:
    Timeout: 30
    MemorySize: 256

Resources:
  ApiProxyFunction:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs20.x
      Architectures:
        - arm64
      Handler: handler.handler
      CodeUri: lambda-dist/
      Environment:
        Variables:
          API_UPSTREAM: !Ref ApiUpstream
          PROXY_CLIENT_IP: !Ref ProxyClientIp
          CORS_ALLOW_ORIGIN: !Ref CorsAllowOrigin
      # Platform CORS + handler CORS (same values) so OPTIONS works even if the runtime short-circuits.
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowCredentials: false
          AllowHeaders:
            - "*"
          AllowMethods:
            - "*"
          AllowOrigins:
            - "*"

Outputs:
  FunctionUrl:
    Description: Paste into frontend VITE_API_URL (no trailing slash).
    Value: !GetAtt ApiProxyFunctionUrl.FunctionUrl
